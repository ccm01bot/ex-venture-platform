<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { margin: 0; width: 1080px; height: 1920px; overflow: hidden; background: #000; font-family: 'Arial', 'Helvetica', sans-serif; }

      #bg-video { position: absolute; width: 1080px; height: 1920px; object-fit: cover; }

      /* Bottom gradient overlay */
      #bottom-grad {
        position: absolute; bottom: 0; left: 0; right: 0; height: 500px;
        background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
        z-index: 5;
      }

      /* Top branding bar */
      #top-brand {
        position: absolute; top: 0; left: 0; right: 0;
        background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        padding: 50px 30px 60px; z-index: 10;
        display: flex; justify-content: space-between; align-items: center;
      }
      #top-brand .logo { color: #00aaff; font-size: 28px; font-weight: bold; letter-spacing: 3px; }
      #top-brand .badge { background: #cc0000; color: #fff; padding: 6px 16px; border-radius: 6px; font-size: 18px; font-weight: bold; }

      /* Hook title (0-5s) */
      #hook-card {
        position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
        text-align: center; z-index: 10; width: 920px;
      }
      #hook-card .title {
        color: #fff; font-size: 72px; font-weight: 900; line-height: 1.1;
        text-shadow: 0 4px 24px rgba(0,0,0,0.95);
        text-transform: uppercase;
      }
      #hook-card .accent-line {
        width: 0; height: 6px; background: #00aaff;
        margin: 18px auto; border-radius: 3px;
      }

      /* Feature panels */
      .feature-panel {
        position: absolute; bottom: 320px; left: 40px; right: 40px;
        background: rgba(0,20,60,0.88); border-left: 5px solid #00aaff;
        border-radius: 0 14px 14px 0; padding: 24px 34px; z-index: 10;
      }
      .feature-panel .text {
        color: #fff; font-size: 42px; font-weight: bold; line-height: 1.3;
        text-shadow: 0 2px 10px rgba(0,0,0,0.8);
      }

      /* Big centered text (25-35s) */
      #big-reveal {
        position: absolute; top: 42%; left: 50%; transform: translate(-50%, -50%);
        text-align: center; z-index: 10; width: 900px;
      }
      #big-reveal .text {
        color: #fff; font-size: 80px; font-weight: 900; line-height: 1.15;
        text-shadow: 0 6px 30px rgba(0,0,0,0.95);
      }
      #big-reveal .sub {
        color: #00aaff; font-size: 32px; font-weight: bold; margin-top: 16px;
        letter-spacing: 4px;
      }

      /* CTA bottom bar */
      #cta-bar {
        position: absolute; bottom: 120px; left: 0; right: 0;
        background: rgba(0,100,255,0.9); padding: 20px 0;
        text-align: center; z-index: 15;
      }
      #cta-bar .text {
        color: #fff; font-size: 34px; font-weight: bold; letter-spacing: 2px;
      }

      /* Progress bar */
      #progress {
        position: absolute; bottom: 0; left: 0; height: 4px;
        background: #00aaff; z-index: 20; width: 0;
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="demo-short" data-start="0" data-duration="40" data-width="1080" data-height="1920">

      <!-- Track 0: Background video -->
      <video id="bg-video" data-start="0" data-duration="40" data-track-index="0" src="source_clip.mp4" autoplay muted></video>

      <!-- Track 1: Bottom gradient -->
      <div id="bottom-grad" class="clip" data-start="0" data-duration="40" data-track-index="1"></div>

      <!-- Track 2: Top branding (always visible) -->
      <div id="top-brand" class="clip" data-start="0" data-duration="40" data-track-index="2">
        <div class="logo">EXAI GLOBAL</div>
        <div class="badge">AI NEWS</div>
      </div>

      <!-- Track 3: Hook (0-5s) -->
      <div id="hook-card" class="clip" data-start="0" data-duration="5" data-track-index="3">
        <div class="accent-line"></div>
        <div class="title" id="hook-text">ANTHROPIC JUST KILLED DESIGN</div>
        <div class="accent-line"></div>
      </div>

      <!-- Track 4: Feature 1 (5-15s) -->
      <div id="feature1" class="clip feature-panel" data-start="5" data-duration="10" data-track-index="4">
        <div class="text">One prompt &rarr; Full dashboard</div>
      </div>

      <!-- Track 5: Feature 2 (15-25s) -->
      <div id="feature2" class="clip feature-panel" data-start="15" data-duration="10" data-track-index="5">
        <div class="text">Charts. Tables. Live data.</div>
      </div>

      <!-- Track 6: Big reveal (25-35s) -->
      <div id="big-reveal" class="clip" data-start="25" data-duration="10" data-track-index="6">
        <div class="text">Claude Design is here.</div>
        <div class="sub">THE FUTURE OF UI</div>
      </div>

      <!-- Track 7: CTA bar (35-40s) -->
      <div id="cta-bar" class="clip" data-start="35" data-duration="5" data-track-index="7">
        <div class="text">Follow @EXAI for daily AI</div>
      </div>

      <!-- Track 8: Progress bar -->
      <div id="progress" class="clip" data-start="0" data-duration="40" data-track-index="8"></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Top brand slide down
      tl.from("#top-brand", { y: -100, opacity: 0, duration: 0.5, ease: "power2.out" }, 0);

      // Badge pulse
      tl.to("#top-brand .badge", { scale: 1.1, duration: 0.5, repeat: Math.floor(40 / 1.0) - 1, yoyo: true }, 0);

      // Hook: dramatic entrance (0-5s)
      tl.from("#hook-text", { scaleX: 0, opacity: 0, duration: 0.7, ease: "back.out(1.7)" }, 0.2);
      tl.from("#hook-card .accent-line", { width: 0, duration: 0.5, ease: "power2.out", stagger: 0.2 }, 0.4);
      tl.to("#hook-card", { opacity: 0, scale: 1.1, duration: 0.4, ease: "power2.in" }, 4.2);

      // Feature 1: slide in from left (5-15s)
      tl.from("#feature1", { x: -1100, duration: 0.5, ease: "power3.out" }, 5);
      tl.to("#feature1", { x: 1100, duration: 0.4, ease: "power2.in" }, 14);

      // Feature 2: slide in from right (15-25s)
      tl.from("#feature2", { x: 1100, duration: 0.5, ease: "power3.out" }, 15);
      tl.to("#feature2", { x: -1100, duration: 0.4, ease: "power2.in" }, 24);

      // Big reveal: fade in centered (25-35s)
      tl.from("#big-reveal .text", { opacity: 0, y: 40, duration: 0.8, ease: "power2.out" }, 25);
      tl.from("#big-reveal .sub", { opacity: 0, y: 20, duration: 0.5, ease: "power2.out" }, 26);
      tl.to("#big-reveal", { opacity: 0, duration: 0.5, ease: "power2.in" }, 34);

      // CTA: bottom bar slide up (35-40s)
      tl.from("#cta-bar", { y: 200, opacity: 0, duration: 0.5, ease: "power3.out" }, 35);

      // Progress bar
      tl.to("#progress", { width: "1080px", duration: 40, ease: "none" }, 0);

      // Bottom gradient fade in
      tl.from("#bottom-grad", { opacity: 0, duration: 1 }, 0);

      window.__timelines["demo-short"] = tl;
    </script>
  </body>
</html>
